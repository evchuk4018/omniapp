name: File Line Limit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  line-limit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce max 300 lines per file
        run: python tests/check_file_length.py
